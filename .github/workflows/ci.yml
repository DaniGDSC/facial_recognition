name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linting tools
        run: pip install ruff bandit
      - name: Run ruff linter
        run: ruff check src/ tests/
      - name: Run ruff formatter check
        run: ruff format --check src/ tests/
      - name: Run bandit security scan
        run: bandit -r src/ -c pyproject.toml --severity-level medium

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit tests
        env:
          PG_PASSWORD: test_password
        run: pytest tests/ -v --tb=short

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --strict

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files --exclude-files '\.lock$' --exclude-files '\.baseline$' \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', {})
          if any(results.values()):
              for f, findings in results.items():
                  for finding in findings:
                      print(f\"::error file={f},line={finding['line_number']}::Potential secret: {finding['type']}\")
              sys.exit(1)
          print('No secrets detected')
          "

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t facial-recognition:test .
