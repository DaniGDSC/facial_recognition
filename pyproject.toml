[tool.ruff]
target-version = "py310"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "S"]
ignore = [
    "S101",  # assert is fine in tests
    "S603",  # subprocess calls are not used
    "S608",  # SQL injection — we use parameterized queries
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S"]

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
