services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${PG_DATABASE:-face_db}
      POSTGRES_USER: ${PG_USER:-admin}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible from localhost
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-admin} -d ${PG_DATABASE:-face_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: ${PG_DATABASE:-face_db}
      PG_USER: ${PG_USER:-admin}
      PG_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      BIOMETRIC_ENCRYPTION_KEY: ${BIOMETRIC_ENCRYPTION_KEY:-}
      EMBEDDING_HMAC_KEY: ${EMBEDDING_HMAC_KEY:-}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-}
    volumes:
      - appdata:/app/data
    stdin_open: true
    tty: true

volumes:
  pgdata:
  appdata:
